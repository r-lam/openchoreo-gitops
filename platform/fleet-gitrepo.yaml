# Fleet wiring for the GitOps repo — using a DEDICATED workspace, not the built-in
# fleet-local. Applied once by a platform engineer (or, better, seeded by Terraform at
# bootstrap — see phase-4.md "Day-0 vs manual"). Three objects, in order:
#
#   1. platform-delivery         - our own Fleet workspace namespace (GitRepos live here)
#   2. BundleNamespaceMapping     - lets bundles from platform-delivery target the
#                                   `local` cluster, which stays in fleet-local
#   3. GitRepo                    - the actual GitOps source, in platform-delivery
#
# WHY a mapping is needed: Fleet only evaluates a GitRepo's targets against Clusters in
# the GitRepo's OWN namespace. Cluster 1 (`local`) is registered in fleet-local and is
# meant to stay there. Rather than pollute fleet-local with our GitRepos (or move the
# management cluster, which Rancher discourages), we keep GitRepos in platform-delivery
# and use a BundleNamespaceMapping to reach the local cluster. Verified against live
# Fleet: `kubectl explain bundlenamespacemapping` (bundleSelector + namespaceSelector),
# and fleet-local carries the label kubernetes.io/metadata.name=fleet-local used below.
#
# NOTE: the GitRepo's namespace is NOT where resources deploy. Each manifest in the repo
# carries its own metadata.namespace (openchoreo-control-plane, k3k-<name>, ...), and
# that is where it lands on the target cluster. Workspace != deploy namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-delivery
  labels:
    # In Rancher this namespace is surfaced as a Fleet "workspace"; you may instead
    # create a FleetWorkspace (management.cattle.io/v3) named platform-delivery, which
    # backs itself with this same namespace and adds workspace-level RBAC.
    openchoreo.dev/purpose: gitops-delivery
---
# Allows Bundles produced in platform-delivery to be deployed to clusters that live in
# the fleet-local namespace (i.e. the `local` management cluster = Cluster 1).
apiVersion: fleet.cattle.io/v1alpha1
kind: BundleNamespaceMapping
metadata:
  name: platform-delivery-to-local
  namespace: platform-delivery
bundleSelector: {}                      # all bundles in this workspace
namespaceSelector:
  matchLabels:
    kubernetes.io/metadata.name: fleet-local
---
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: openchoreo-app-delivery
  namespace: platform-delivery          # <-- dedicated workspace, NOT fleet-local
spec:
  repo: "https://github.com/<your-org>/<your-gitops-repo>.git"
  branch: main
  # One path per environment. Environments are folders, not branches, so Fleet syncs
  # them all from the same commit.
  paths:
    - base
    - envs/development
    - envs/staging
    - envs/production
  # Target the local cluster (Cluster 1 = OpenChoreo control plane). Reachable from
  # this workspace only because of the BundleNamespaceMapping above. Selected by the
  # `local` Fleet Cluster's own label rather than by clusterName, which is
  # namespace-scoped.
  targets:
    - clusterSelector:
        matchLabels:
          name: local
